<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mijn Collectie - Team3Labs</title>

    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/collection.css" />

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  </head>
  <body>
    <header class="main-header app-header">
      <div class="header-left">
        <a href="search.html" class="logo">Team3Labs</a>

        <button class="hamburger" id="hamburgerBtn" aria-label="Menu openen">
          <span></span>
          <span></span>
          <span></span>
        </button>
         
        <nav class="main-nav" id="mainNav">
          <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="search.html">Zoeken</a></li>
            <li><a href="collection.html" class="active">Mijn Collectie</a></li>
            <li><a href="compare.html">Vergelijken</a></li>
            <li><a href="guess.html">Guess</a></li>
          </ul>
        </nav>
      </div>

      <div class="header-right auth-buttons">
        <div class="current-game-badge">
          <span class="badge-label">Huidige Game:</span>
          <span class="badge-title" id="headerCurrentGame">Geen gekozen</span>
        </div>

        <div class="user-menu">
          <span class="user-avatar">U1</span>
          <a href="index.html" class="btn btn-outline btn-small">Uitloggen</a>
        </div>
      </div>
    </header>

    <main class="content-wrapper app-content">
      <section class="collection-hero">
        <h1 class="page-title">Mijn Collectie</h1>
        <p class="page-subtitle">Bekijk, sorteer en beheer hier je opgeslagen games.</p>
      </section>

      <section class="collection-toolbar">
        <div class="toolbar-left">
          <label for="sort" class="toolbar-label">Sorteren op</label>
          <select id="sort" class="toolbar-select">
            <option value="rating">Rating (Hoog - Laag)</option>
            <option value="name">Naam (A - Z)</option>
            <option value="release">Release date</option>
          </select>
        </div>
      </section>

      <section class="results-section">
        <div class="games-grid" id="gamesGrid" aria-live="polite">
          </div>
      </section>
    </main>

    <script src="js/main.js"></script>
    <script src="js/collectionPage.js"></script>
  </body>
</html>
