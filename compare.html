<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vergelijken - Team3Labs</title>

    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/compare.css" />
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  </head>
  <body>
    <header class="main-header app-header">
      <div class="header-left">
        <a href="search.html" class="logo">Team3Labs</a>

        <button class="hamburger" id="hamburgerBtn" aria-label="Menu openen">
          <span></span>
          <span></span>
          <span></span>
        </button>
         
        <nav class="main-nav" id="mainNav">
          <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="search.html">Zoeken</a></li>
            <li><a href="collection.html">Mijn Collectie</a></li>
            <li><a href="compare.html" class="active">Vergelijken</a></li>
            <li><a href="guess.html">Guess</a></li>
          </ul>
        </nav>
      </div>

      <div class="header-right auth-buttons">
        <div class="current-game-badge">
          <span class="badge-label">Huidige Game:</span>
          <span class="badge-title">Geen gekozen</span>
        </div>

        <div class="user-menu">
          <span class="user-avatar">U1</span>
          <a href="index.html" class="btn btn-outline btn-small">Uitloggen</a>
        </div>
      </div>
    </header>

    <main class="content-wrapper app-content">
      <section class="compare-intro">
        <h1 class="page-title">Games Vergelijken</h1>
        <p>Kies twee games om hun statistieken zij-aan-zij te vergelijken.</p>
      </section>

      <section class="compare-search-area">
        <div class="search-box-container">
          <input type="text" id="searchInput1" class="search-input" placeholder="Game 1 (bijv. GTA V)..." autocomplete="off" />
        </div>

        <div class="vs-badge">VS</div>

        <div class="search-box-container">
          <input type="text" id="searchInput2" class="search-input" placeholder="Game 2 (bijv. RDR 2)..." autocomplete="off" />
        </div>

        <button id="compareBtn" class="btn btn-primary compare-btn">Vergelijk</button>
      </section>

      <section class="results-section">
        <div class="compare-results-area" id="compareResults" aria-live="polite">
          </div>
      </section>
    </main>

    <script src="js/comparePage.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
