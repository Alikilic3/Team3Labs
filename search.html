<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zoeken - GameHub</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/search.css" />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/components.css" />
  </head>
  <body>
    <header class="main-header app-header">
      <div class="header-left">
        <a href="search.html" class="logo">Team3Labs</a>
        <nav class="main-nav">
          <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="search.html" class="active">Zoeken</a></li>
            <li><a href="collection.html">Mijn Collectie</a></li>
            <li><a href="compare.html">Vergelijken</a></li>
            <li><a href="guess.html">Guess Game</a></li>
          </ul>
        </nav>
      </div>

      <div class="header-right">
        <div class="current-game-badge">
          <span class="badge-label">Huidige Game:</span>
          <span class="badge-title">Geen gekozen</span>
        </div>

        <div class="user-menu">
          <span class="user-avatar">U1</span>
          <a href="index.html" class="btn btn-outline btn-small">Uitloggen</a>
        </div>
      </div>
    </header>

    <main class="content-wrapper app-content">
      <section class="search-section">
        <h1 class="page-title">Ontdek nieuwe games!</h1>
        <div class="search-modes">
          <button id="favoritesViewBtn" class="mode-btn active">
            Mijn favoriete games
          </button>
          <button id="searchViewBtn" class="mode-btn">Zoek nieuwe games</button>
        </div>
        <div class="search-box-container">
          <input
            type="text"
            id="searchInput"
            class="search-input"
            placeholder="Zoek een game via de RAWG database..."
            autocomplete="off"
          />
          <button id="searchBtn" class="btn btn-primary search-btn">
            Zoeken
          </button>

          <ul
            class="autocomplete-results"
            class="autocomplete-results"
            style="display: none"
          >
            <li>The Witcher 3: Wild Hunt</li>
            <li>The Legend of Zelda: Breath of the Wild</li>
          </ul>
        </div>
      </section>

      <section class="results-section">
        <h2>Zoekresultaten</h2>
        <div class="games-grid" id="gamesGrid"></div>
      </section>
      <div id="gameModal" class="game-modal hidden">
        <div class="game-modal-content">
          <button id="closeModal" class="close-modal">&times;</button>
          <div id="modalBody"></div>
        </div>
      </div>
    </main>
    <script type="module" src="js/search.js"></script>
  </body>
</html>
